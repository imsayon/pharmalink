{% extends 'base.html' %}

{% block title %}Login - PharmaLink{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-slate-100 p-4">
    <div class="w-full max-w-md">
        <!-- Logo Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-600 text-white mb-4 shadow-lg shadow-blue-200">
                <i class="fas fa-prescription-bottle-alt text-2xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-800">PharmaLink</h1>
            <p class="text-slate-500 mt-2">Inventory & Analytics System</p>
        </div>

        <!-- Login Form -->
        <div class="glass-card p-8 shadow-xl">
            <h2 class="text-xl font-semibold mb-6 text-center">Admin Login</h2>
            
            <form action="{{ url_for('do_login') }}" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-slate-400"></i>
                        </div>
                        <input type="text" name="username" required 
                            class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors bg-white/50 backdrop-blur-sm"
                            placeholder="admin">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-slate-400"></i>
                        </div>
                        <input type="password" name="password" required 
                            class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors bg-white/50 backdrop-blur-sm"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center text-slate-600">
                        <input type="checkbox" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500 mr-2">
                        Remember me
                    </label>
                    <a href="#" class="text-blue-600 hover:text-blue-700 font-medium">Forgot Password?</a>
                </div>

                <button type="submit" 
                    class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-medium hover:bg-blue-700 focus:ring-4 focus:ring-blue-200 transition-all hover:shadow-lg hover:shadow-blue-200 flex items-center justify-center gap-2">
                    Sign In <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            
            <div class="mt-6 text-center text-sm text-slate-500">
                <p>Default credentials: admin / admin</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
