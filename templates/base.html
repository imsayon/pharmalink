<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PharmaLink{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#1e40af',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div id="flash-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2">
            {% for category, message in messages %}
                <div class="px-4 py-3 rounded-lg shadow-lg border-l-4 transition-all duration-500 ease-in-out transform translate-x-0
                    {% if category == 'success' %}bg-white border-green-500 text-green-700
                    {% elif category == 'error' %}bg-white border-red-500 text-red-700
                    {% else %}bg-white border-blue-500 text-blue-700{% endif %}">
                    <div class="flex items-center justify-between">
                        <p class="font-medium">{{ message }}</p>
                        <button onclick="this.parentElement.parentElement.remove()" class="ml-4 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    <script>
        // Auto-hide flash messages after 5 seconds
        setTimeout(() => {
            const flashContainer = document.getElementById('flash-container');
            if(flashContainer) {
                flashContainer.style.opacity = '0';
                setTimeout(() => flashContainer.remove(), 500);
            }
        }, 5000);
    </script>
</body>
</html>
